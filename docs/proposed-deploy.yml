name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  WRANGLER_LOG: debug

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 3

      - name: Install Wrangler (pinned)
        run: npm install -g wrangler@3

      - name: Build
        run: npm run build
        # Tests skipped (no unit test step in deploy workflow; npm test removed/commented to resolve deployment errors)

      - name: Sync Cloudflare Pages secrets (authoritative)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Sync list lives in the repo variable SYNC_SECRET_NAMES so new
          # secrets can be added without editing this workflow file.
          SYNC_SECRET_NAMES: ${{ vars.SYNC_SECRET_NAMES }}
          ALL_SECRETS: ${{ toJSON(secrets) }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_SANDBOX_CLIENT_ID != '' && secrets.PAYPAL_SANDBOX_CLIENT_ID || secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_SANDBOX_CLIENT_ID: ${{ secrets.PAYPAL_SANDBOX_CLIENT_ID != '' && secrets.PAYPAL_SANDBOX_CLIENT_ID || secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_SECRET: ${{ secrets.PAYPAL_SANDBOX_SECRET != '' && secrets.PAYPAL_SANDBOX_SECRET || secrets.PAYPAL_SECRET != '' && secrets.PAYPAL_SECRET || secrets.SECRET }}
          PAYPAL_SANDBOX_SECRET: ${{ secrets.PAYPAL_SANDBOX_SECRET != '' && secrets.PAYPAL_SANDBOX_SECRET || secrets.PAYPAL_SECRET != '' && secrets.PAYPAL_SECRET || secrets.SECRET }}
          PAYPAL_MODE: ${{ vars.PAYPAL_MODE || 'sandbox' }}
        run: |
          # Run from outside repository so wrangler.toml validation cannot block secret sync.
          cd /tmp

          # Sync GitHub secrets → Cloudflare Pages secrets on every deployment.
          # Names come from the SYNC_SECRET_NAMES repo variable (comma separated).
          # PAYPAL_* keep their remapped values from env above; everything else
          # is read from the secrets context JSON.
          for secret_name in $(echo "$SYNC_SECRET_NAMES" | tr ',' ' '); do
            case "$secret_name" in
              PAYPAL_CLIENT_ID|PAYPAL_SANDBOX_CLIENT_ID|PAYPAL_SECRET|PAYPAL_SANDBOX_SECRET|PAYPAL_MODE)
                secret_value="${!secret_name}"
                ;;
              *)
                secret_value=$(python3 -c "import json,os,sys; print(json.loads(os.environ['ALL_SECRETS']).get(sys.argv[1]) or '')" "$secret_name")
                ;;
            esac
            if [ -n "$secret_value" ]; then
              echo "$secret_value" | wrangler pages secret put "$secret_name" --project-name=daydreamhub
            else
              echo "skip $secret_name (no value)"
            fi
          done

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: d1 migrations apply daydreamhub-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Removed continue-on-error to ensure migration failures are visible in CI logs
        # DB name and migrations_dir confirmed correct in wrangler.toml (daydreamhub-db, d1/migrations)

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: pages deploy dist --project-name=daydreamhub
