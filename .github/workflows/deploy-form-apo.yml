name: Deploy form-apo-service
on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-form-apo]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Decode and write files
        env:
          INDEX_B64: ""
          STYLE_B64: ""
          THANKS_B64: ""
          APPLY_B64: ""
        run: |
          mkdir -p public functions/api
          echo "$INDEX_B64" | base64 -d > public/index.html
          echo "$STYLE_B64" | base64 -d > public/style.css
          echo "$THANKS_B64" | base64 -d > public/thanks.html
          echo "$APPLY_B64" | base64 -d > functions/api/apply.js
      - name: Install wrangler
        run: npm install -g wrangler@latest
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy public --project-name=form-apo
