name: Deploy form-apo-service
on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-form-apo]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Prepare files
        run: |
          mkdir -p public
      - name: Create index.html
        run: |
          printf '%s\n' '<!DOCTYPE html>' '<html lang="ja">' '<head>' '<meta charset="UTF-8">' -e '<title>form-apo</title>' '</head>' '<body>' '<h1>form-apo</h1>' '</body>' '</html>' > public/index.html
      - name: Create style.css
        run: touch public/style.css
      - name: Create thanks.html
        run: touch public/thanks.html
      - name: Create functions dir
        run: mkdir -p functions/api
      - name: Create apply.js
        run: |
          cat > functions/api/apply.js << 'EOF'
          export async function onRequest(ctx) {
            return new Response("ok");
          }
          EOF
      - name: Install wrangler
        run: npm install -g wrangler@latest
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy public --project-name=form-apo
