name: Fix Resend DNS Records

on:
  workflow_dispatch:

jobs:
  fix-resend-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID
        id: zone
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          ZONE_ID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          if not r.get('result'):
              print('ERROR: zone not found')
              exit(1)
          print(r['result'][0]['id'])
          ")
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "✅ Zone ID: $ZONE_ID"

      - name: Add MX record for send subdomain
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          echo "=== Adding MX record: send.daydreamhub.com → feedback-smtp.ap-northeast-1.amazonses.com (pri=10) ==="
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"MX","name":"send","content":"feedback-smtp.ap-northeast-1.amazonses.com","priority":10,"ttl":120}')
          if echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('success') else 1)" 2>/dev/null; then
            echo "✅ MX record added successfully!"
          else
            ERR=$(echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('errors',[{}])[0].get('message','unknown'))" 2>/dev/null)
            echo "⚠️ $ERR"
          fi

      - name: Add SPF TXT record for send subdomain
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          echo "=== Adding SPF TXT: send.daydreamhub.com → v=spf1 include:amazonses.com ~all ==="
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"TXT","name":"send","content":"v=spf1 include:amazonses.com ~all","ttl":120}')
          if echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('success') else 1)" 2>/dev/null; then
            echo "✅ SPF TXT record added successfully!"
          else
            ERR=$(echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r.get('errors',[{}])[0].get('message','unknown'))" 2>/dev/null)
            echo "⚠️ $ERR"
          fi

      - name: Verify created records
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          echo ""
          echo "=== Verifying DNS records for send.daydreamhub.com ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=send.daydreamhub.com&per_page=100" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          recs = r.get('result', [])
          if not recs:
              print('  (no records found)')
          for rec in recs:
              prio = f\" pri={rec['priority']}\" if rec.get('priority') else ''
              print(f\"  {rec['type']:6} {rec['name']:45} {rec['content']:60}{prio}\")
          "
          echo ""
          echo "=== All daydreamhub.com DNS records ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?per_page=100" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for rec in r.get('result', []):
              prio = f\" pri={rec['priority']}\" if rec.get('priority') else ''
              proxied = ' (proxied)' if rec.get('proxied') else ''
              print(f\"  {rec['type']:6} {rec['name']:45} {rec['content']:60}{prio}{proxied}\")
          "
