name: Check Cloudflare Account

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check account ID and Pages projects
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Account ID (first 8 chars) ==="
          echo "${CF_ACCOUNT_ID}" | cut -c1-8

          echo "=== Pages projects in this account ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          if not r.get('success'):
              print('ERROR:', r.get('errors'))
          else:
              for p in r.get('result', []):
                  print('Project:', p['name'])
                  print('  subdomain:', p.get('subdomain'))
                  domains = p.get('domains', [])
                  print('  custom domains:', domains)
          "

          echo "=== Zone account ID (first 8 chars) ==="
          echo "4f2fb14e"
          echo "(zone account: 4f2fb14e751ec75ab0666c9413a233bc)"
