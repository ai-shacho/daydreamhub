name: Add Cloudflare Zone (daydreamhub.com)

on:
  workflow_dispatch:

jobs:
  add-zone:
    runs-on: ubuntu-latest
    steps:
      - name: Check token permissions
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== Token verification ==="
          curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -m json.tool

      - name: Get Account ID
        id: account
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Account ID ==="
          echo "account_id=${CF_ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "Using Account ID: ${CF_ACCOUNT_ID}"

      - name: Try to create zone for daydreamhub.com
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"daydreamhub.com\",\"account\":{\"id\":\"${CF_ACCOUNT_ID}\"},\"type\":\"full\"}")
          echo "$RESPONSE" | python3 -m json.tool
          echo "$RESPONSE" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          if r.get('success'):
              ns = r['result']['name_servers']
              print('=== ✅ Zone created! Name servers: ===')
              for n in ns:
                  print(f'  - {n}')
          else:
              print('=== ❌ Failed ===')
              for e in r.get('errors', []):
                  print(f\"  - {e.get('code')}: {e.get('message')}\")
          "

      - name: List existing zones (if creation failed, zone might already exist)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== All zones in account ==="
          curl -s "https://api.cloudflare.com/client/v4/zones?per_page=50" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for z in r.get('result', []):
              print(f\"{z['name']} | status: {z.get('status')} | ns: {', '.join(z.get('name_servers', []))}\")"
