name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 3

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Ensure Cloudflare Pages secrets exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_SECRET: ${{ secrets.PAYPAL_SECRET }}
          PAYPAL_MODE: ${{ secrets.PAYPAL_MODE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
          TELNYX_CONNECTION_ID: ${{ secrets.TELNYX_CONNECTION_ID }}
          TELNYX_FROM_NUMBER: ${{ secrets.TELNYX_FROM_NUMBER }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          # Sync GitHub secrets → Cloudflare Pages secrets on every deployment
          secrets=(
            "PAYPAL_CLIENT_ID"
            "PAYPAL_SECRET"
            "PAYPAL_MODE"
            "RESEND_API_KEY"
            "ADMIN_EMAIL"
            "JWT_SECRET"
            "TELNYX_API_KEY"
            "TELNYX_CONNECTION_ID"
            "TELNYX_FROM_NUMBER"
            "GOOGLE_PLACES_API_KEY"
          )
          for secret_name in "${secrets[@]}"; do
            secret_value="${!secret_name}"
            if [ -n "$secret_value" ]; then
              echo "$secret_value" | npx wrangler pages secret put "$secret_name" --project-name=daydreamhub
            fi
          done

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply daydreamhub-db --remote
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=daydreamhub
