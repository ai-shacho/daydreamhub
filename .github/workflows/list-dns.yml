name: List Current DNS Records

on:
  workflow_dispatch:

jobs:
  list-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID
        id: zone
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          ZONE_ID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          results = r.get('result', [])
          if not results:
              print('ERROR: zone not found')
              exit(1)
          print(results[0]['id'])
          ")
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT

      - name: List ALL DNS records
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          echo "=== Current DNS records in daydreamhub.com zone ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?per_page=100" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for rec in r.get('result', []):
              proxied = ' (proxied)' if rec.get('proxied') else ''
              prio = f\" pri={rec['priority']}\" if rec.get('priority') else ''
              print(f\"  {rec['type']:6} {rec['name']:45} {rec['content']:60}{prio}{proxied}\")
          "
