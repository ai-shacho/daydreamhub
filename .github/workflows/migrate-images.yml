name: Migrate Images to R2

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not upload or update DB)'
        type: boolean
        default: true
      batch_size:
        description: 'Max images to process this run (0 = no limit)'
        default: '100'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install boto3 requests

      - name: Extract image URLs from D1
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python3 <<'EOF'
          import os, json, urllib.request, re
          import ssl

          account = os.environ['CF_ACCOUNT_ID']
          token = os.environ['CF_API_TOKEN']

          # Find D1 database ID
          req = urllib.request.Request(
              f"https://api.cloudflare.com/client/v4/accounts/{account}/d1/database",
              headers={"Authorization": f"Bearer {token}"}
          )
          dbs = json.loads(urllib.request.urlopen(req).read())
          db_id = None
          for db in dbs.get('result', []):
              if db['name'] == 'daydreamhub-db':
                  db_id = db['uuid']
                  break
          print(f"D1 DB ID: {db_id}")
          with open('db_id.txt', 'w') as f:
              f.write(db_id)

          def query(sql):
              data = json.dumps({"sql": sql}).encode()
              req = urllib.request.Request(
                  f"https://api.cloudflare.com/client/v4/accounts/{account}/d1/database/{db_id}/query",
                  data=data,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
              )
              r = json.loads(urllib.request.urlopen(req).read())
              return r['result'][0]['results']

          urls = set()

          # blog_posts.thumbnail_url
          rows = query("SELECT thumbnail_url FROM blog_posts WHERE thumbnail_url LIKE '%daydreamhub.com/wp-content%'")
          for r in rows:
              urls.add(r['thumbnail_url'])
          print(f"blog_posts.thumbnail_url: {len(rows)}")

          # hotels.thumbnail_url
          rows = query("SELECT thumbnail_url FROM hotels WHERE thumbnail_url LIKE '%daydreamhub.com/wp-content%'")
          for r in rows:
              urls.add(r['thumbnail_url'])
          print(f"hotels.thumbnail_url: {len(rows)}")

          # hotel_images.image_url
          rows = query("SELECT image_url FROM hotel_images WHERE image_url LIKE '%daydreamhub.com/wp-content%'")
          for r in rows:
              urls.add(r['image_url'])
          print(f"hotel_images.image_url: {len(rows)}")

          # blog_posts.content (extract URLs)
          rows = query("SELECT id, content FROM blog_posts WHERE content LIKE '%daydreamhub.com/wp-content%'")
          pattern = re.compile(r'https://daydreamhub\.com/wp-content/uploads/[^\s"\'\\)<>]+')
          content_matches = 0
          for r in rows:
              for m in pattern.findall(r['content'] or ''):
                  urls.add(m)
                  content_matches += 1
          print(f"blog_posts.content refs: {content_matches} in {len(rows)} posts")

          urls = sorted(urls)
          print(f"Total unique URLs: {len(urls)}")
          with open('urls.txt', 'w') as f:
              for u in urls:
                  f.write(u + '\n')
          EOF

      - name: Show URL stats
        run: |
          echo "Total URLs to migrate:"
          wc -l urls.txt
          echo "Sample:"
          head -5 urls.txt

      - name: Download from old server and upload to R2
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
        run: |
          python3 <<'EOF'
          import os, boto3, requests, json, threading, time
          from urllib.parse import urlparse
          from botocore.config import Config
          from concurrent.futures import ThreadPoolExecutor, as_completed

          dry_run = os.environ['DRY_RUN'] == 'true'
          batch_size = int(os.environ['BATCH_SIZE'])
          account = os.environ['CF_ACCOUNT_ID']

          # Disable SSL warning noise
          import urllib3
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          s3 = boto3.client(
              's3',
              endpoint_url=f"https://{account}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              config=Config(signature_version='s3v4', region_name='auto', max_pool_connections=50),
          )

          with open('urls.txt') as f:
              urls = [l.strip() for l in f if l.strip()]

          if batch_size > 0:
              urls = urls[:batch_size]

          # Preload existing R2 keys to skip
          existing = set()
          paginator = s3.get_paginator('list_objects_v2')
          try:
              for page in paginator.paginate(Bucket='daydreamhub-media'):
                  for obj in page.get('Contents', []):
                      existing.add(obj['Key'])
          except Exception as e:
              print(f"(list_objects_v2 warn: {e})")
          print(f"Existing R2 objects: {len(existing)}")

          url_to_key = {}
          tasks = []
          for url in urls:
              path = urlparse(url).path
              key = path.lstrip('/')
              url_to_key[url] = key
              if key not in existing:
                  tasks.append((url, key))

          skipped = len(urls) - len(tasks)
          print(f"To process: {len(tasks)}, skipped: {skipped}")

          if dry_run:
              for url, key in tasks[:3]:
                  print(f"[DRY] {url} -> {key}")
              print(f"\n=== Result (DRY) ===")
              print(f"Total: {len(urls)}")
              print(f"Would upload: {len(tasks)}")
              print(f"Skipped: {skipped}")
              with open('url_to_key.json', 'w') as f:
                  json.dump(url_to_key, f)
              exit(0)

          success = 0
          failed = 0
          lock = threading.Lock()
          start = time.time()

          session = requests.Session()
          adapter = requests.adapters.HTTPAdapter(pool_connections=50, pool_maxsize=50)
          session.mount('https://', adapter)

          def process(task):
              url, key = task
              try:
                  old_url = url.replace('https://daydreamhub.com', 'https://192.252.156.122')
                  r = session.get(old_url, headers={'Host': 'daydreamhub.com'},
                                  verify=False, timeout=30)
                  if r.status_code != 200:
                      return (url, False, f"HTTP {r.status_code}")
                  ctype = r.headers.get('Content-Type', 'application/octet-stream')
                  s3.put_object(Bucket='daydreamhub-media', Key=key, Body=r.content, ContentType=ctype)
                  return (url, True, None)
              except Exception as e:
                  return (url, False, str(e))

          with ThreadPoolExecutor(max_workers=20) as ex:
              futures = [ex.submit(process, t) for t in tasks]
              for fut in as_completed(futures):
                  url, ok, err = fut.result()
                  with lock:
                      if ok:
                          success += 1
                          if success % 100 == 0:
                              elapsed = time.time() - start
                              rate = success / elapsed if elapsed > 0 else 0
                              remaining = (len(tasks) - success - failed) / rate if rate > 0 else 0
                              print(f"Progress: {success}/{len(tasks)} ({rate:.1f}/s, ETA {remaining:.0f}s)")
                      else:
                          failed += 1
                          if failed <= 10:
                              print(f"❌ {err}: {url}")

          print(f"\n=== Result ===")
          print(f"Total: {len(urls)}")
          print(f"Uploaded: {success}")
          print(f"Skipped (already in R2): {skipped}")
          print(f"Failed: {failed}")


          with open('url_to_key.json', 'w') as f:
              json.dump(url_to_key, f)
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: migration-data
          path: |
            urls.txt
            url_to_key.json
            db_id.txt
