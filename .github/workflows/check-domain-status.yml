name: Check Pages Domain Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check daydreamhub project domains
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Pages project daydreamhub domains ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/daydreamhub/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -m json.tool

          echo ""
          echo "=== daydreamhub.com domain detail ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/daydreamhub/domains/daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -m json.tool

          echo ""
          echo "=== www.daydreamhub.com domain detail ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/daydreamhub/domains/www.daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -m json.tool

          echo ""
          echo "=== Deployments (last 3) ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/daydreamhub/deployments?per_page=3" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for d in r.get('result', []):
              print(f\"{d['created_on']} | {d.get('environment','')} | {d.get('latest_stage',{}).get('status','')}\")
              print(f\"  url: {d.get('url')}\")
              print(f\"  aliases: {d.get('aliases')}\")
          "
