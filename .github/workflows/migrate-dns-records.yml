name: Migrate DNS Records to Cloudflare

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID
        id: zone
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          echo "$RESPONSE" | python3 -m json.tool
          ZONE_ID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          results = r.get('result', [])
          if not results:
              print('ERROR: zone not found')
              exit(1)
          print(results[0]['id'])
          ")
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "Zone ID: $ZONE_ID"

      - name: Show existing records
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== Existing DNS records in Cloudflare ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records?per_page=100" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for rec in r.get('result', []):
              print(f\"{rec['type']:6} {rec['name']:50} {rec['content']}\")
          "

      - name: Add MX records
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          add_record() {
            local DATA="$1"
            local DESC="$2"
            RESP=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$DATA")
            if echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('success') else 1)" 2>/dev/null; then
              echo "✅ Added: $DESC"
            else
              echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); errs=r.get('errors',[]); print('⚠️ ' + str(errs[0].get('message','')) if errs else '⚠️ unknown error')"
            fi
          }

          # MX: mail.daydreamhub.com (priority 0)
          add_record '{"type":"MX","name":"@","content":"mail.daydreamhub.com","priority":0,"ttl":1}' "MX mail.daydreamhub.com (pri 0)"

          # MX: Amazon SES feedback (priority 10)
          add_record '{"type":"MX","name":"@","content":"feedback-smtp.ap-northeast-1.amazonses.com","priority":10,"ttl":1}' "MX Amazon SES (pri 10)"

      - name: Add A record for mail subdomain
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"A","name":"mail","content":"192.252.156.122","ttl":1,"proxied":false}')
          if echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('success') else 1)" 2>/dev/null; then
            echo "✅ Added: A mail.daydreamhub.com -> 192.252.156.122"
          else
            echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); errs=r.get('errors',[]); print('⚠️ ' + str(errs[0].get('message','')) if errs else '⚠️ unknown')"
          fi

      - name: Add SPF TXT record
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"TXT","name":"@","content":"v=spf1 a mx include:amazonses.com ~all","ttl":1}')
          if echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('success') else 1)" 2>/dev/null; then
            echo "✅ Added: SPF TXT (updated to include amazonses.com instead of SureServer)"
          else
            echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); errs=r.get('errors',[]); print('⚠️ ' + str(errs[0].get('message','')) if errs else '⚠️ unknown')"
          fi

      - name: Add DKIM TXT record
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"TXT","name":"@","content":"v=DKIM1; p=MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQDruHQNo+sG1FKlYOcOgxEGjqVmKjQ842oMhUtH++N2KnbGn9kXW+axzAQRlwzzGySwb+7gAVdfCiYT85duL8hLkX//ysnnodV3Tj4gp2IK/3sOTGWzsOhGNPVMSyUB1sIVqOGnvLzds2/Qu/5K/8vlxnj5L2WmsMW8RuQ1i+33eQIDAQAB","ttl":1}')
          if echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('success') else 1)" 2>/dev/null; then
            echo "✅ Added: DKIM TXT"
          else
            echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); errs=r.get('errors',[]); print('⚠️ ' + str(errs[0].get('message','')) if errs else '⚠️ unknown')"
          fi

      - name: Add DMARC TXT record
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"TXT","name":"_dmarc","content":"v=DMARC1; p=none;","ttl":1}')
          if echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('success') else 1)" 2>/dev/null; then
            echo "✅ Added: DMARC TXT"
          else
            echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); errs=r.get('errors',[]); print('⚠️ ' + str(errs[0].get('message','')) if errs else '⚠️ unknown')"
          fi

      - name: Add www CNAME
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"www","content":"daydreamhub.pages.dev","ttl":1,"proxied":true}')
          if echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('success') else 1)" 2>/dev/null; then
            echo "✅ Added: CNAME www -> daydreamhub.pages.dev"
          else
            echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); errs=r.get('errors',[]); print('⚠️ ' + str(errs[0].get('message','')) if errs else '⚠️ unknown')"
          fi

      - name: Add root CNAME (@ -> Pages)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          RESP=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"@","content":"daydreamhub.pages.dev","ttl":1,"proxied":true}')
          if echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); exit(0 if r.get('success') else 1)" 2>/dev/null; then
            echo "✅ Added: CNAME @ -> daydreamhub.pages.dev"
          else
            echo "$RESP" | python3 -c "import sys,json; r=json.load(sys.stdin); errs=r.get('errors',[]); print('⚠️ ' + str(errs[0].get('message','')) if errs else '⚠️ unknown')"
          fi

      - name: Show all records after migration
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== Final DNS records in Cloudflare zone ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records?per_page=100" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for rec in r.get('result', []):
              print(f\"{rec['type']:6} {rec['name']:50} {rec['content']}\")
          "
          echo ""
          echo "=== Next step ==="
          echo "Change nameservers at your domain registrar to:"
          echo "  keaton.ns.cloudflare.com"
          echo "  mina.ns.cloudflare.com"
