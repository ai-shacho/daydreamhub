name: Re-verify Resend Domain

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Resend domain verification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "=== Verifying Resend domain: daydreamhub.com ==="
          RESP=$(curl -s -X POST \
            "https://api.resend.com/domains/ec2d68d5-1961-47eb-9bb4-7844f3f90a57/verify" \
            -H "Authorization: Bearer ${RESEND_API_KEY}")
          echo "$RESP" | python3 -m json.tool

          echo ""
          echo "=== Checking domain status after verification ==="
          sleep 5
          curl -s "https://api.resend.com/domains/ec2d68d5-1961-47eb-9bb4-7844f3f90a57" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          print(f\"Domain: {r.get('name')}\")
          print(f\"Status: {r.get('status')}\")
          print(f\"Records:\")
          for rec in r.get('records', []):
              print(f\"  {rec['record']:6} {rec['name']:40} {rec['type']:6} status={rec['status']}\")
          "
