name: Resend Domain Status

on:
  workflow_dispatch:

jobs:
  check-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Get Resend domains
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          echo "=== Resend Domains ==="
          curl -s "https://api.resend.com/domains" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" | python3 -m json.tool
