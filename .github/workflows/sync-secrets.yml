name: Sync Secrets to Cloudflare Pages

# Manual trigger only - run when secrets are added/updated in GitHub
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Sync PAYPAL_CLIENT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.PAYPAL_CLIENT_ID }}" | wrangler pages secret put PAYPAL_CLIENT_ID --project-name=daydreamhub

      - name: Sync PAYPAL_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.PAYPAL_SECRET }}" | wrangler pages secret put PAYPAL_SECRET --project-name=daydreamhub

      - name: Sync PAYPAL_MODE
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.PAYPAL_MODE }}" | wrangler pages secret put PAYPAL_MODE --project-name=daydreamhub

      - name: Sync RESEND_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.RESEND_API_KEY }}" | wrangler pages secret put RESEND_API_KEY --project-name=daydreamhub

      - name: Sync ADMIN_EMAIL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.ADMIN_EMAIL }}" | wrangler pages secret put ADMIN_EMAIL --project-name=daydreamhub

      - name: Sync JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.JWT_SECRET }}" | wrangler pages secret put JWT_SECRET --project-name=daydreamhub

      - name: Sync TELNYX_API_KEY
        if: ${{ secrets.TELNYX_API_KEY != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.TELNYX_API_KEY }}" | wrangler pages secret put TELNYX_API_KEY --project-name=daydreamhub

      - name: Sync TELNYX_CONNECTION_ID
        if: ${{ secrets.TELNYX_CONNECTION_ID != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.TELNYX_CONNECTION_ID }}" | wrangler pages secret put TELNYX_CONNECTION_ID --project-name=daydreamhub

      - name: Sync TELNYX_FROM_NUMBER
        if: ${{ secrets.TELNYX_FROM_NUMBER != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.TELNYX_FROM_NUMBER }}" | wrangler pages secret put TELNYX_FROM_NUMBER --project-name=daydreamhub

      - name: Trigger redeploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm ci
          npm run build
          wrangler pages deploy dist --project-name=daydreamhub
