name: Sync Secrets to Cloudflare Pages

# Manual trigger only - run when secrets are added/updated in GitHub
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TWILIO_ACCOUNT_SID_VAL: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN_VAL: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM_NUMBER_VAL: ${{ secrets.TWILIO_FROM_NUMBER }}
      TELNYX_API_KEY_VAL: ${{ secrets.TELNYX_API_KEY }}
      TELNYX_CONNECTION_ID_VAL: ${{ secrets.TELNYX_CONNECTION_ID }}
      TELNYX_FROM_NUMBER_VAL: ${{ secrets.TELNYX_FROM_NUMBER }}
      GOOGLE_PLACES_API_KEY_VAL: ${{ secrets.GOOGLE_PLACES_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Sync PAYPAL_CLIENT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYPAL_CLIENT_ID_VALUE: ${{ secrets.PAYPAL_SANDBOX_CLIENT_ID != '' && secrets.PAYPAL_SANDBOX_CLIENT_ID || secrets.PAYPAL_CLIENT_ID }}
        run: |
          cd /tmp
          echo "$PAYPAL_CLIENT_ID_VALUE" | wrangler pages secret put PAYPAL_CLIENT_ID --project-name=daydreamhub

      - name: Sync PAYPAL_SANDBOX_CLIENT_ID
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYPAL_SANDBOX_CLIENT_ID_VALUE: ${{ secrets.PAYPAL_SANDBOX_CLIENT_ID != '' && secrets.PAYPAL_SANDBOX_CLIENT_ID || secrets.PAYPAL_CLIENT_ID }}
        run: |
          cd /tmp
          echo "$PAYPAL_SANDBOX_CLIENT_ID_VALUE" | wrangler pages secret put PAYPAL_SANDBOX_CLIENT_ID --project-name=daydreamhub

      - name: Sync PAYPAL_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYPAL_SECRET_VALUE: ${{ secrets.PAYPAL_SANDBOX_SECRET != '' && secrets.PAYPAL_SANDBOX_SECRET || secrets.PAYPAL_SECRET != '' && secrets.PAYPAL_SECRET || secrets.SECRET }}
        run: |
          cd /tmp
          echo "$PAYPAL_SECRET_VALUE" | wrangler pages secret put PAYPAL_SECRET --project-name=daydreamhub

      - name: Sync PAYPAL_SANDBOX_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAYPAL_SANDBOX_SECRET_VALUE: ${{ secrets.PAYPAL_SANDBOX_SECRET != '' && secrets.PAYPAL_SANDBOX_SECRET || secrets.PAYPAL_SECRET != '' && secrets.PAYPAL_SECRET || secrets.SECRET }}
        run: |
          cd /tmp
          echo "$PAYPAL_SANDBOX_SECRET_VALUE" | wrangler pages secret put PAYPAL_SANDBOX_SECRET --project-name=daydreamhub

      - name: Sync PAYPAL_MODE
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "sandbox" | wrangler pages secret put PAYPAL_MODE --project-name=daydreamhub

      - name: Sync RESEND_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "${{ secrets.RESEND_API_KEY }}" | wrangler pages secret put RESEND_API_KEY --project-name=daydreamhub

      - name: Sync ADMIN_EMAIL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "${{ secrets.ADMIN_EMAIL }}" | wrangler pages secret put ADMIN_EMAIL --project-name=daydreamhub

      - name: Sync JWT_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "${{ secrets.JWT_SECRET }}" | wrangler pages secret put JWT_SECRET --project-name=daydreamhub

      - name: Sync TWILIO_ACCOUNT_SID
        if: env.TWILIO_ACCOUNT_SID_VAL != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "$TWILIO_ACCOUNT_SID_VAL" | wrangler pages secret put TWILIO_ACCOUNT_SID --project-name=daydreamhub

      - name: Sync TWILIO_AUTH_TOKEN
        if: env.TWILIO_AUTH_TOKEN_VAL != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "$TWILIO_AUTH_TOKEN_VAL" | wrangler pages secret put TWILIO_AUTH_TOKEN --project-name=daydreamhub

      - name: Sync TWILIO_FROM_NUMBER
        if: env.TWILIO_FROM_NUMBER_VAL != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "$TWILIO_FROM_NUMBER_VAL" | wrangler pages secret put TWILIO_FROM_NUMBER --project-name=daydreamhub

      - name: Sync TELNYX_API_KEY
        if: env.TELNYX_API_KEY_VAL != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "$TELNYX_API_KEY_VAL" | wrangler pages secret put TELNYX_API_KEY --project-name=daydreamhub

      - name: Sync TELNYX_CONNECTION_ID
        if: env.TELNYX_CONNECTION_ID_VAL != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "$TELNYX_CONNECTION_ID_VAL" | wrangler pages secret put TELNYX_CONNECTION_ID --project-name=daydreamhub

      - name: Sync TELNYX_FROM_NUMBER
        if: env.TELNYX_FROM_NUMBER_VAL != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "$TELNYX_FROM_NUMBER_VAL" | wrangler pages secret put TELNYX_FROM_NUMBER --project-name=daydreamhub

      - name: Sync GOOGLE_PLACES_API_KEY
        if: env.GOOGLE_PLACES_API_KEY_VAL != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd /tmp
          echo "$GOOGLE_PLACES_API_KEY_VAL" | wrangler pages secret put GOOGLE_PLACES_API_KEY --project-name=daydreamhub

      - name: Trigger redeploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm ci
          npm run build
          cd /tmp
          wrangler pages deploy /home/runner/work/daydreamhub/daydreamhub/dist --project-name=daydreamhub
