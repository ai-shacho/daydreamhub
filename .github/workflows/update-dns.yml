name: Update DNS to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID for daydreamhub.com
        id: zone
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          echo "$RESPONSE" | python3 -m json.tool
          ZONE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['result'][0]['id'])")
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "Zone ID: $ZONE_ID"

      - name: List current DNS records
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records?name=daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -m json.tool

      - name: Update/Create CNAME for daydreamhub.com → Pages
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"

          # 既存のAレコードを取得
          RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=A&name=daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          echo "Existing A records: $RECORDS"

          RECORD_ID=$(echo "$RECORDS" | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          results = r.get('result', [])
          print(results[0]['id'] if results else '')
          ")

          if [ -n "$RECORD_ID" ]; then
            echo "Deleting existing A record: $RECORD_ID"
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -m json.tool
          fi

          # daydreamhub.com → daydreamhub.pages.dev のCNAMEを作成
          echo "Creating CNAME record..."
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "CNAME",
              "name": "daydreamhub.com",
              "content": "daydreamhub.pages.dev",
              "proxied": true
            }' | python3 -m json.tool

      - name: Update/Create CNAME for www → Pages
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"

          RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=www.daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")

          RECORD_ID=$(echo "$RECORDS" | python3 -c "
          import sys,json
          r=json.load(sys.stdin)
          results = r.get('result', [])
          print(results[0]['id'] if results else '')
          ")

          if [ -n "$RECORD_ID" ]; then
            echo "Deleting existing www record: $RECORD_ID"
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RECORD_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -m json.tool
          fi

          echo "Creating www CNAME record..."
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "CNAME",
              "name": "www",
              "content": "daydreamhub.pages.dev",
              "proxied": true
            }' | python3 -m json.tool

          echo "✅ DNS update complete!"
