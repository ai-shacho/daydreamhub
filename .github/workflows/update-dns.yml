name: Update DNS to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Get Zone ID
        id: zone
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=daydreamhub.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          echo "$RESPONSE"
          ZONE_ID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          results = r.get('result', [])
          if not results:
              print('ERROR: zone not found')
              exit(1)
          print(results[0]['id'])
          ")
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "Zone ID: $ZONE_ID"

      - name: Show current DNS records
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "=== All DNS records for daydreamhub.com ==="
          curl -s "https://api.cloudflare.com/client/v4/zones/${{ steps.zone.outputs.zone_id }}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for rec in r.get('result', []):
              print(f\"{rec['type']:6} {rec['name']:40} -> {rec['content']}  (id={rec['id']})\")
          "

      - name: Delete existing A/CNAME records for root domain
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          for TYPE in A CNAME; do
            RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=${TYPE}&name=daydreamhub.com" \
              -H "Authorization: Bearer ${CF_API_TOKEN}")
            IDS=$(echo "$RECORDS" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for rec in r.get('result', []):
              print(rec['id'])
          ")
            for RID in $IDS; do
              echo "Deleting ${TYPE} record $RID"
              curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RID}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "import sys,json; r=json.load(sys.stdin); print('deleted' if r.get('success') else r)"
            done
          done

      - name: Create CNAME for root domain → Pages
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"@","content":"daydreamhub.pages.dev","proxied":true}')
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          if r.get('success'):
              print('✅ Root CNAME created!')
          else:
              print('❌ Error:', r.get('errors'))
              exit(1)
          "

      - name: Delete existing records for www
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          for TYPE in A CNAME; do
            RECORDS=$(curl -s "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=${TYPE}&name=www.daydreamhub.com" \
              -H "Authorization: Bearer ${CF_API_TOKEN}")
            IDS=$(echo "$RECORDS" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          for rec in r.get('result', []):
              print(rec['id'])
          ")
            for RID in $IDS; do
              echo "Deleting www ${TYPE} record $RID"
              curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${RID}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" | python3 -c "import sys,json; r=json.load(sys.stdin); print('deleted' if r.get('success') else r)"
            done
          done

      - name: Create CNAME for www → Pages
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"CNAME","name":"www","content":"daydreamhub.pages.dev","proxied":true}')
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          if r.get('success'):
              print('✅ www CNAME created!')
          else:
              print('⚠️ www:', r.get('errors'))
          "

      - name: Verify DNS
        run: |
          echo "=== DNS verification ==="
          dig daydreamhub.com +short
          dig www.daydreamhub.com +short
