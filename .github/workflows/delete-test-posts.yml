name: Delete Test Posts from D1

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show matching posts without deleting)'
        type: boolean
        default: true

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 3

      - name: Find and delete test posts (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute daydreamhub-db --remote --command="SELECT id, slug, title FROM blog_posts WHERE slug LIKE 'singapore-hidden-gems-guide%' ORDER BY slug;"

      - name: Delete test posts (real run)
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute daydreamhub-db --remote --command="DELETE FROM blog_posts WHERE slug LIKE 'singapore-hidden-gems-guide%';"

      - name: Verify deletion
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute daydreamhub-db --remote --command="SELECT COUNT(*) as deleted, GROUP_CONCAT(slug) as remaining FROM blog_posts WHERE slug LIKE 'singapore-hidden-gems-guide%';"
