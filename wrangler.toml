name = "daydreamhub"
main = "worker-entry.mjs"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "daydreamhub-db"
database_id = "9e5348d0-477f-40fe-ac05-e842164b9032"
migrations_dir = "d1/migrations"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "daydreamhub-images"

[ai]
binding = "AI"

[[queues.producers]]
binding = "FLIGHT_IMAGE_QUEUE"
queue = "ddh-flight-image-jobs"

[[queues.consumers]]
queue = "ddh-flight-image-jobs"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 5

# [triggers] - Pages does not support triggers; use external cron (e.g. cron-job.org)
# crons = ["0 1 * * *"]
# Cron: 毎日01:00 UTC に /api/cron/update-booking-status を POST で叩くこと
# 外部サービス（cron-job.org 等）から Authorization: Bearer {CRON_SECRET} を付けてリクエスト
